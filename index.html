<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Conducting a DP Year | Interactive Web</title>
  <style>
    :root {
      --navy:#061B3A; --navy2:#020B1A; --blue:#0B2A54; --blue2:#123E72; --gold:#F2B705; --gold2:#FFD35A;
      --white:#F7FAFF; --muted:#B7C6D8; --pale:#E9F0F8; --ink:#111827; --panel:#09274F;
      --glass:rgba(255,255,255,.08); --glass2:rgba(255,255,255,.12); --line:rgba(255,255,255,.15);
      --shadow:0 18px 60px rgba(0,0,0,.28); --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family:Inter, Aptos, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:radial-gradient(circle at 90% 0%, #18497b 0, transparent 38%), linear-gradient(135deg,var(--navy2),var(--navy)); color:var(--white); overflow-x:hidden;}
    button,input,textarea{font-family:inherit}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;justify-content:space-between;padding:12px 16px;background:rgba(2,11,26,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .crest{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#fff0a5);color:var(--navy);font-weight:900;box-shadow:0 0 0 3px rgba(242,183,5,.18)}
    .brand h1{font-size:15px;line-height:1.1;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand small{display:block;color:var(--muted);font-weight:500;margin-top:3px}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--white);padding:9px 12px;border-radius:999px;cursor:pointer;font-weight:700;font-size:13px;transition:.18s ease;white-space:nowrap}
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.14)}
    .btn.primary{background:var(--gold);color:var(--navy);border-color:var(--gold)}
    .btn.ghost{background:transparent}
    .app{display:grid;grid-template-columns:250px minmax(0,1fr);gap:18px;padding:18px;max-width:1480px;margin:0 auto}
    .sidebar{position:sticky;top:78px;height:calc(100dvh - 96px);overflow:auto;padding:12px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.06);box-shadow:var(--shadow)}
    .progress-wrap{padding:8px 8px 14px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
    .progress{height:8px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden}
    .progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:.2s}
    .slide-nav{display:grid;gap:8px}
    .nav-item{text-align:left;width:100%;border:1px solid transparent;background:transparent;color:var(--muted);padding:10px;border-radius:14px;cursor:pointer;display:grid;grid-template-columns:30px 1fr;gap:8px;align-items:start}
    .nav-item b{color:var(--gold);font-size:13px}
    .nav-item span{font-size:12.5px;line-height:1.2}
    .nav-item.active{background:rgba(242,183,5,.12);border-color:rgba(242,183,5,.35);color:var(--white)}
    .main{display:grid;grid-template-columns:minmax(0,1.38fr) minmax(340px,.62fr);gap:18px;min-width:0}
    .stage{min-width:0}
    .slide-card{position:relative;min-height:calc(100dvh - 116px);border:1px solid var(--line);border-radius:var(--radius);padding:30px;background:linear-gradient(145deg,rgba(6,27,58,.98),rgba(6,27,58,.92));box-shadow:var(--shadow);overflow:hidden}
    .slide-card:before{content:"";position:absolute;right:-120px;top:-120px;width:360px;height:360px;border:2px solid rgba(242,183,5,.24);border-radius:50%;box-shadow:0 0 0 54px rgba(18,62,114,.28);pointer-events:none}
    .slide-card:after{content:"";position:absolute;left:-120px;bottom:-120px;width:300px;height:300px;border:1px solid rgba(255,255,255,.10);border-radius:50%;pointer-events:none}
    .slide-inner{position:relative;z-index:1;display:flex;flex-direction:column;min-height:calc(100dvh - 176px)}
    .slide-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;color:var(--gold);font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:12px}
    .slide-num{font-size:26px;color:var(--gold);font-weight:900;letter-spacing:0}
    .slide-title{font-size:clamp(30px,5.4vw,64px);line-height:.95;margin:0 0 10px;font-weight:950;letter-spacing:-.045em;max-width:980px}
    .slide-title.small{font-size:clamp(24px,3.6vw,46px);line-height:1.04}
    .slide-subtitle{font-size:clamp(15px,2vw,21px);color:var(--pale);margin:0 0 24px;font-weight:700;max-width:850px}
    .quote{position:relative;border:1px solid rgba(255,255,255,.14);background:rgba(11,42,84,.82);padding:20px 22px 20px 56px;border-radius:20px;margin:4px 0 24px;box-shadow:0 14px 38px rgba(0,0,0,.15)}
    .quote:before{content:"“";position:absolute;left:18px;top:2px;font-size:62px;line-height:1;color:var(--gold);font-family:Georgia,serif}
    .quote p{margin:0;font-size:clamp(17px,2.4vw,29px);line-height:1.14;font-weight:900;letter-spacing:-.02em}
    .content-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:auto}
    .content-grid.many{grid-template-columns:repeat(3,minmax(0,1fr))}
    .block{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);border-radius:18px;padding:16px;min-height:110px}
    .block .label{display:flex;align-items:center;gap:8px;color:var(--gold);font-weight:900;font-size:14px;margin-bottom:8px}
    .badge{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:rgba(242,183,5,.14);border:1px solid rgba(242,183,5,.32);font-size:12px;color:var(--gold);flex:0 0 28px}
    .block p{margin:0;color:#e8f1ff;line-height:1.45;font-weight:560}
    .pills{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 20px}
    .pill{border:1px solid rgba(242,183,5,.45);color:var(--gold2);background:rgba(242,183,5,.08);border-radius:999px;padding:9px 13px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .slide-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.13);color:var(--muted);font-size:12px}
    .workbook{position:sticky;top:78px;align-self:start;max-height:calc(100dvh - 96px);overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.94);color:var(--ink);box-shadow:var(--shadow)}
    .work-head{position:sticky;top:0;z-index:2;padding:18px 18px 12px;background:linear-gradient(180deg,#ffffff,#f5f8fd);border-bottom:1px solid #d9e2ef;border-radius:var(--radius) var(--radius) 0 0}
    .work-head .eyebrow{color:#7b5a00;font-weight:900;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
    .work-head h2{margin:4px 0 5px;color:var(--navy);font-size:20px;line-height:1.1}
    .work-head p{margin:0;color:#4b5563;font-size:13px}
    .work-body{padding:18px}
    .key-msg{background:#f3f7fb;border:1px solid #d8e4f2;border-radius:16px;padding:13px 14px;color:#1f2937;line-height:1.45;margin-bottom:16px}
    .key-msg b{color:var(--navy)}
    .field{margin:15px 0}
    .field label{display:block;font-weight:850;color:var(--navy);font-size:13px;margin-bottom:8px}
    textarea,input[type=text]{width:100%;border:1px solid #c8d5e6;background:#fff;border-radius:14px;padding:12px;font-size:14px;min-height:82px;resize:vertical;color:#111827;outline:none}
    textarea:focus,input[type=text]:focus{border-color:#b38900;box-shadow:0 0 0 3px rgba(242,183,5,.18)}
    .checklist{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0 16px}
    .check{display:flex;gap:8px;align-items:flex-start;border:1px solid #dbe5f1;background:#fff;border-radius:12px;padding:9px;font-size:13px;line-height:1.2}
    .check input{margin-top:1px;accent-color:#b38900}
    .scorecard{display:grid;gap:12px;margin:10px 0 16px}
    .score{border:1px solid #dbe5f1;background:#fff;border-radius:14px;padding:11px}
    .score label{font-weight:800;color:var(--navy);font-size:13px;display:flex;justify-content:space-between;gap:8px}
    .score input{width:100%;accent-color:#b38900;margin-top:8px}
    .storybox{border:1px dashed rgba(242,183,5,.55);background:rgba(242,183,5,.08);border-radius:18px;padding:14px;margin-top:18px;color:#f9e4a0}
    .storybox h3{margin:0 0 8px;color:var(--gold);font-size:14px}
    .storybox ol{margin:0;padding-left:19px;color:#dfeaff;font-size:13px;line-height:1.42}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:none;grid-template-columns:1fr auto 1fr;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(2,11,26,.88);backdrop-filter:blur(16px);border-top:1px solid var(--line)}
    .status{align-self:center;text-align:center;color:var(--muted);font-size:12px;font-weight:800}
    .audience .app{grid-template-columns:1fr;max-width:1180px}
    .audience .sidebar,.audience .workbook{display:none}
    .audience .main{grid-template-columns:1fr}
    .audience .slide-card{min-height:calc(100dvh - 110px)}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(2,11,26,.72);backdrop-filter:blur(8px);z-index:80}
    .modal.show{display:flex}
    .modal-card{width:min(760px,100%);max-height:86dvh;overflow:auto;background:#fff;color:var(--ink);border-radius:22px;box-shadow:var(--shadow)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px;border-bottom:1px solid #e5e7eb}
    .modal-head h2{margin:0;color:var(--navy)}
    .modal-body{padding:18px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.45}
    .print-area{display:none}
    @media (max-width:1120px){
      .app{grid-template-columns:1fr;padding:12px;padding-bottom:80px}
      .sidebar{position:relative;top:auto;height:auto;display:block;overflow:hidden;padding:10px;border-radius:18px}
      .slide-nav{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
      .nav-item{min-width:160px;grid-template-columns:24px 1fr}
      .main{grid-template-columns:1fr}
      .workbook{position:relative;top:auto;max-height:none}
      .slide-card{min-height:auto}
      .slide-inner{min-height:auto}
      .bottom-nav{display:grid}
    }
    @media (max-width:720px){
      .topbar{padding:10px 12px}
      .brand h1{font-size:13px;max-width:180px}
      .brand small{display:none}
      .top-actions .btn:not(.primary){display:none}
      .slide-card{padding:18px;border-radius:18px}
      .slide-title{font-size:38px}
      .slide-title.small{font-size:30px}
      .quote{padding:17px 16px 17px 48px;border-radius:16px}
      .quote p{font-size:20px}
      .content-grid,.content-grid.many{grid-template-columns:1fr}
      .block{min-height:auto;padding:13px;border-radius:15px}
      .workbook{border-radius:18px}
      .checklist{grid-template-columns:1fr}
      .slide-footer{display:block;line-height:1.5}
    }
    @media print{
      body{background:#fff;color:#111;overflow:visible}
      .topbar,.app,.bottom-nav,.modal{display:none!important}
      .print-area{display:block!important;color:#111;padding:0}
      .print-section{break-after:page;padding:18mm}
      .print-section h1{font-size:22pt;color:#061B3A;margin:0 0 3mm}
      .print-section h2{font-size:14pt;color:#061B3A;margin:0 0 3mm}
      .print-section p{font-size:10pt;line-height:1.35}
      .print-field{border:1px solid #b9c7d8;border-radius:8px;padding:8px;margin:6px 0 11px;min-height:28px;white-space:pre-wrap}
      .print-quote{border-left:4px solid #F2B705;padding-left:10px;font-weight:bold;color:#061B3A}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="crest">DP</div>
      <div><h1>Conducting a DP Year</h1><small>Interactive masterclass + aligned workbook</small></div>
    </div>
    <div class="top-actions">
      <button class="btn ghost" id="notesBtn">Trainer notes</button>
      <button class="btn ghost" id="audienceBtn">Audience view</button>
      <button class="btn ghost" id="printBtn">Print workbook</button>
      <button class="btn" id="exportBtn">Export answers</button>
      <button class="btn primary" id="fullBtn">Fullscreen</button>
    </div>
  </header>
  <div class="app">
    <aside class="sidebar">
      <div class="progress-wrap">
        <div class="progress-label"><span>Workbook progress</span><span id="progressText">0%</span></div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>
      <nav class="slide-nav" id="slideNav"></nav>
    </aside>
    <main class="main">
      <section class="stage" id="stage"></section>
      <aside class="workbook" id="workbook"></aside>
    </main>
  </div>
  <div class="bottom-nav">
    <button class="btn" id="prevBtn">← Previous</button>
    <div class="status" id="mobileStatus">1 / 16</div>
    <button class="btn primary" id="nextBtn">Next →</button>
  </div>
  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head"><h2 id="modalTitle">Trainer notes</h2><button class="btn" id="closeModal">Close</button></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <div class="print-area" id="printArea"></div>
  <script>
    const slides = [{"id": 1, "section": "Opening", "title": "Conducting a DP Year", "subtitle": "Lead the District. Win the Hearts. Build the Legacy.", "quote": "One Year. One District. One Legacy.", "blocks": [{"label": "Session", "text": "How to Conduct a DP Year"}, {"label": "Guest Speaker", "text": "Leo Lion Navod Kiriwaththuduwa • Past Multiple District President"}, {"label": "Forum", "text": "District Presidents’ Forum • Leo Multiple District 306 Sri Lanka & Maldives"}, {"label": "Date & Venue", "text": "04 & 05 July 2026 • Echidna Dreaming Resort, Galle"}], "pills": ["Lead the District", "Win the Hearts", "Build the Legacy"], "story": ["Open warmly. Tell them this is not a normal lecture about positions; it is a conversation about the responsibility behind the title.", "Anchor line: The gavel is not the beginning of leadership. It is the public confirmation of responsibility you have already accepted."], "workbook": {"key": "Participant details", "questions": ["My district", "My theme for the year", "One word I want people to connect with my leadership", "At the end of my DP year, I want my district to be remembered for"]}}, {"id": 2, "section": "Opening mindset", "title": "Leadership begins when you accept the weight", "subtitle": "The gavel is given once. The responsibility is carried every day.", "quote": "A DP year is not just a calendar of events. It is a year of decisions, discipline, people, pressure and legacy.", "blocks": [{"label": "Story cue", "text": "The moment someone tells you: ‘There are things to change. Take the position and do that change.’ That is when leadership becomes personal."}, {"label": "Message to DPs", "text": "Do not ask, ‘What can I get from this year?’ Ask, ‘What must become better because I was trusted with this year?’"}], "pills": ["Accept the weight", "Protect the people", "Leave it better"], "story": ["Tell your own leadership decision story: someone gave you a reason, and that reason was change.", "Connect it to every DP: their title now carries the expectations of clubs, officers, Lions and the Multiple District."], "workbook": {"key": "Accepting the weight", "questions": ["What is the real reason I accepted this DP year?", "What responsibility feels heaviest right now?", "What must become better because I was trusted with this year?"]}}, {"id": 3, "section": "The role", "title": "What a DP really carries", "subtitle": "The title is visible. The invisible responsibility is heavier.", "quote": "You are not above the clubs. You are responsible for the clubs.", "blocks": [{"label": "Vision setter", "text": "Keeps the district direction clear when activities become noisy."}, {"label": "Standard keeper", "text": "Protects quality, ethics, protocol and the image of the movement."}, {"label": "Relationship builder", "text": "Connects clubs, officers, Lions, advisors, past leaders and Council."}, {"label": "Problem absorber", "text": "Receives pressure without transferring panic to the district."}, {"label": "Club strengthener", "text": "Measures success by club health, not personal popularity."}, {"label": "Brand ambassador", "text": "Every speech, post and decision becomes part of district PR."}], "story": ["Explain that a district slows down when its DP becomes confused, reactive or emotionally unstable.", "Ask: Which of these six responsibilities is the heaviest for you right now?"], "workbook": {"key": "Role clarity", "questions": ["A DP is responsible for", "The role I must improve most is", "The type of pressure I must learn to absorb without panic is"], "checklist": ["Vision setter", "Standard keeper", "Relationship builder", "Problem absorber", "Club strengthener", "Brand ambassador"]}}, {"id": 4, "section": "The compass", "title": "Your DP compass", "subtitle": "When the year becomes complex, come back to four directions.", "quote": "A leader without a compass becomes busy, but not effective.", "blocks": [{"label": "Vision", "text": "Where are we going?"}, {"label": "People", "text": "Who must be carried?"}, {"label": "Discipline", "text": "What must be protected?"}, {"label": "Movement", "text": "How will we make MD 306 stronger?"}], "story": ["Use this as a decision filter: if an activity does not support vision, people, discipline or the movement, rethink it.", "Remind them that being busy is not the same as being effective."], "workbook": {"key": "DP compass", "questions": ["My vision direction for the district is", "People I must carry and protect", "The standards I must protect", "How my district will strengthen MD 306"]}}, {"id": 5, "section": "Know the district", "title": "Know your district before you lead it", "subtitle": "Emotion inspires people. Data tells you where to start.", "quote": "Do not lead the district you imagine. Lead the district that actually exists.", "blocks": [{"label": "Clubs", "text": "Active / weak / inactive"}, {"label": "Members", "text": "Growth / retention / engagement"}, {"label": "Reporting", "text": "Service / officers / dues"}, {"label": "People", "text": "Leaders / advisors / past leaders"}, {"label": "Risks", "text": "Conflict / finance / calendar pressure"}, {"label": "Strengths", "text": "Signature projects / PR / talent"}], "pills": ["Meet key people", "Review club status", "Identify danger points", "Set a baseline"], "story": ["This is where many DPs fail: they lead from assumptions, not reality.", "Say: A good DP does not wait for problems to become public. They identify danger points early."], "workbook": {"key": "District reality check", "questions": ["Total clubs", "Active clubs", "Weak / inactive clubs", "Total members", "Biggest district strength", "Biggest district risk", "Three clubs I must visit first"], "checklist": ["Review club status", "Meet advisors", "Review reporting", "Review dues status", "Map weak clubs", "Identify past leaders to involve"]}}, {"id": 6, "section": "Year planning", "title": "Plan the year before the year controls you", "subtitle": "A DP without a plan will spend the year reacting to pressure.", "quote": "Planning is not paperwork. Planning is respect for the people who will work with you.", "blocks": [{"label": "Vision & theme", "text": "One clear direction that clubs can remember."}, {"label": "Annual calendar", "text": "Avoid clashes, overload and last-minute panic."}, {"label": "Club visit plan", "text": "Prioritize weak, remote and high-potential clubs."}, {"label": "Training rhythm", "text": "Officers, presidents, treasurers, PR, reporting."}, {"label": "Finance discipline", "text": "Budgets, approvals, transparency and trust."}, {"label": "Recognition plan", "text": "Appreciate early, often and fairly."}, {"label": "PR calendar", "text": "Tell the district story consistently."}, {"label": "Succession plan", "text": "Prepare the next layer from the first quarter."}], "story": ["Tell them that poor planning creates volunteer burnout. Good planning protects people’s time and energy.", "Ask them to choose their first three planning priorities before leaving the room."], "workbook": {"key": "Annual planning", "questions": ["My top 5 priorities for the year", "My first 30-day action", "Key dates I must finalize early", "How I will prevent last-minute pressure"], "checklist": ["District vision", "Annual calendar", "Club visits", "Training plan", "Finance plan", "PR calendar", "Recognition plan", "Succession plan"]}}, {"id": 7, "section": "Year map", "title": "The DP year map", "subtitle": "Every quarter has a different purpose. Do not use the same energy for all four.", "quote": "Do not only start strong. Design the year so the district can finish strong.", "blocks": [{"label": "Q1 — Set direction", "text": "Activate officers, orient clubs, finalize calendar, baseline reporting."}, {"label": "Q2 — Build momentum", "text": "Club visits, membership push, PR rhythm, weak club recovery."}, {"label": "Q3 — Create impact", "text": "Signature service, visibility, leadership development, Leo-Lion bond."}, {"label": "Q4 — Finish strong", "text": "Awards, succession, documentation, handover and legacy protection."}], "story": ["Explain that the energy of Q1 cannot be the same as Q4. Each quarter has a mission.", "Your experience as MDP: when districts did not plan handover and succession, the next year became weaker."], "workbook": {"key": "Quarter map", "questions": ["Q1 focus", "Q2 focus", "Q3 focus", "Q4 focus", "What I must do now to finish strong later"]}}, {"id": 8, "section": "Working with Council", "title": "Working with the Council", "subtitle": "A DP who fights the Council becomes isolated. A DP who works with the Council becomes stronger.", "quote": "Council is not a stage to prove who is bigger. It is a table to make the Multiple stronger.", "blocks": [{"label": "Represent professionally", "text": "Carry your district voice with maturity, not emotion."}, {"label": "Report early", "text": "Do not wait until a small issue becomes a public crisis."}, {"label": "Support MD initiatives", "text": "A strong Multiple is built by strong district cooperation."}, {"label": "Ask before guessing", "text": "Council experience can prevent avoidable mistakes."}, {"label": "Keep politics contained", "text": "Do not export every district conflict into Council space."}, {"label": "Share good practice", "text": "Let your district become a model others can learn from."}], "story": ["Speak from MDP experience: when one district struggles silently, the whole Multiple feels it later.", "Make them understand Council is not above them as a threat; it is around them as support and governance."], "workbook": {"key": "Council relationship", "questions": ["How I will represent my district at Council level", "What I must report early", "What support I may need from the Council", "How my district can support MD initiatives"]}}, {"id": 9, "section": "Lions partnership", "title": "Working with Lions and advisors", "subtitle": "Lions are not controllers. They are guardians, supporters and partners.", "quote": "A mat "label": "Conflict", "text": "Do not react publicly in anger."}, {"label": "Credit", "text": "Appreciate fairly and sincerely."}, {"label": "Promises", "text": "Do not promise what you cannot deliver."}, {"label": "Protocol", "text": "Know the basics and ask when unsure."}], "pills": ["Character becomes culture", "Culture becomes reputation", "Reputation becomes legacy"], "story": ["Tell them clearly: title increases visibility. It does not give freedom to behave carelessly.", "A DP’s personal discipline sets the tone for district officers."], "workbook": {"key": "DP behaviour self-check", "questions": ["The behaviour standard I must improve most", "What I must stop doing publicly", "What I must model for district officers", "My personal discipline promise"], "checklist": ["Respectful speech", "Proper dress", "Careful posts", "Prepared meetings", "Calm conflict handling", "Fair credit", "Realistic promises", "Protocol awareness"]}}, {"id": 14, "section": "Global arena", "title": "Your district is part of the world", "subtitle": "MD 306 becomes stronger when every district thinks beyond its own boundary.", "quote": "Do not only become the best district in the room. Become a district the world can learn from.", "blocks": [{"label": "Global Lions scale", "text": "1.4M Lions members • 50K Lions clubs • 200+ countries and geographic areas."}, {"label": "Leo movement", "text": "7,700+ Leo clubs worldwide • 200K+ Leos."}, {"label": "ISAME / CA VI", "text": "India, South Asia and the Middle East. Sri Lanka & Maldives belong to this larger leadership arena."}, {"label": "MD 306 mindset", "text": "You are one of 12 districts in MD 306, one district inside ISAME, and one voice in a movement serving across the world."}, {"label": "Challenge", "text": "Do work that can be proudly shown at MD, ISAME and international level."}, {"label": "Note", "text": "Global figures can change by Lions year. Verify current numbers through official Lions sources before formal publication."}], "s hip pipeline", "PR & reputation", "Leo-Lion relationship"]}}, {"id": 16, "section": "Legacy", "title": "The gavel is temporary. The impact is permanent.", "subtitle": "End the year with people stronger than how you received them.", "quote": "At the end of my DP year, people should say: During this year, our district became _________.", "blocks": [{"label": "Final challenge", "text": "Do not only complete the year. Conduct the year. Carry the year. Build the year. Leave the year better."}, {"label": "Legacy pledge", "text": "I will lead with weight, plan with clarity, win with hearts, and make my district a strength to MD 306."}, {"label": "Closing line", "text": "Lead the District • Win the Hearts • Build the Legacy"}], "story": ["Close emotionally. Bring back the gavel. Titles end, but people remember the leader who made them stronger.", "Invite them to write their legacy sentence and keep it visible throughout the year."], "workbook": {"key": "Legacy statement", "questions": ["During my year, our district became", "The people who must become stronger because of my leadership", "The standard I will never compromise", "My final DP year pledge"]}}];
    const STORE = 'dp-year-interactive-v1:';
    let current = 0;
    let trainerNotesVisible = true;

    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));
    const esc = (str='') => String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const keyFor = (...parts) => STORE + parts.join(':');

    function getValue(key){ return localStorage.getItem(key) || ''; }
    function setValue(key, value){ localStorage.setItem(key, value); updateProgress(); }

    function renderNav(){
      const nav = $('#slideNav');
      nav.innerHTML = slides.map((s,i)=>`<button class="nav-item ${i===current?'active':''}" data-i="${i}"><b>${String(s.id).padStart(2,'0')}</b><span>${esc(s.title)}</span></button>`).join('');
      $$('.nav-item', nav).forEach(btn => btn.addEventListener('click', () => go(+btn.dataset.i)));
    }

    function renderSlide(){
      const s = slides[current];
      const many = s.blocks.length > 4 ? 'many' : '';
      const small = s.title.length > 28 ? 'small' : '';
      $('#stage').innerHTML = `
        <article class="slide-card">
          <div class="slide-inner">
            <div class="slide-meta"><span>${esc(s.section)}</span><span class="slide-num">${String(s.id).padStart(2,'0')}</span></div>
            <h1 class="slide-title ${small}">${esc(s.title)}</h1>
            <p class="slide-subtitle">${esc(s.subtitle || '')}</p>
            <div class="quote"><p>${esc(s.quote || '')}</p></div>
            ${s.pills ? `<div class="pills">${s.pills.map(p=>`<span class="pill">${esc(p)}</span>`).join('')}</div>` : ''}
            <div class="content-grid ${many}">
              ${s.blocks.map((b,idx)=>`<div class="block"><div class="label"><span class="badge">${idx+1}</span>${esc(b.label)}</div><p>${esc(b.text)}</p></div>`).join('')}
            </div>
            <div class="slide-footer"><span>Leo Multiple District 306 Sri Lanka & Maldives</span><span>Lead the District • Win the Hearts • Build the Legacy</span></div>
            ${trainerNotesVisible ? `<div class="storybox"><h3>Trainer story prompts</h3><ol>${(s.story||[]).map(n=>`<li>${esc(n)}</li>`).join('')}</ol></div>` : ''}
          </div>
        </article>`;
      $('#mobileStatus').textContent = `${current+1} / ${slides.length}`;
    }

    function renderWorkbook(){
      const s = slides[current], wb = s.workbook || {};
      const qHtml = (wb.questions || []).map((q, qi)=>{
        const k = keyFor(s.id, 'q', qi);
        return `<div class="field"><label>${esc(q)}</label><textarea data-key="${k}" placeholder="Write here...">${esc(getValue(k))}</textarea></div>`;
      }).join('');
      const cHtml = wb.checklist ? `<div class="field"><label>Checklist</label><div class="checklist">${wb.checklist.map((item,ci)=>{ const k=keyFor(s.id,'check',ci); return `<label class="check"><input type="checkbox" data-key="${k}" ${getValue(k)==='1'?'checked':''}> <span>${esc(item)}</span></label>`; }).join('')}</div></div>` : '';
      const scoreHtml = wb.scorecard ? `<div class="field"><label>Score your current readiness</label><div class="scorecard">${wb.scorecard.map((item,ri)=>{ const k=keyFor(s.id,'score',ri); const val=getValue(k)||'5'; return `<div class="score"><label>${esc(item)} <span>${val}/10</span></label><input type="range" min="1" max="10" value="${val}" data-key="${k}"></div>`; }).join('')}</div></div>` : '';
      $('#workbook').innerHTML = `
        <div class="work-head"><div class="eyebrow">Slide ${String(s.id).padStart(2,'0')} workbook</div><h2>${esc(wb.key || s.title)}</h2><p>Aligned with the current presentation slide. Your answers are saved in this browser.</p></div>
        <div class="work-body">
          <div class="key-msg"><b>Key message:</b> ${esc(s.quote || s.subtitle || '')}</div>
          ${qHtml}
          ${cHtml}
          ${scoreHtml}
          <div class="field"><label>Action after this forum</label><textarea data-key="${keyFor(s.id,'action')}" placeholder="One practical action I will take...">${esc(getValue(keyFor(s.id,'action')))}</textarea></div>
        </div>`;
      $$('textarea,input[type="checkbox"],input[type="range"]', $('#workbook')).forEach(el => {
        if(el.type === 'checkbox') el.addEventListener('change', e => setValue(e.target.dataset.key, e.target.checked ? '1' : '0'));
        else if(el.type === 'range') el.addEventListener('input', e => { setValue(e.target.dataset.key, e.target.value); e.target.closest('.score').querySelector('span').textContent = e.target.value + '/10'; });
        else el.addEventListener('input', e => setValue(e.target.dataset.key, e.target.value));
      });
    }

    function go(i){
      current = Math.max(0, Math.min(slides.length-1, i));
      renderNav(); renderSlide(); renderWorkbook(); updateProgress(); renderPrintArea();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function updateProgress(){
      let total = 0, filled = 0;
      slides.forEach(s => {
        const wb = s.workbook || {};
        (wb.questions || []).forEach((_, qi)=>{ total++; if(getValue(keyFor(s.id,'q',qi)).trim()) filled++; });
        (wb.checklist || []).forEach((_, ci)=>{ total++; if(getValue(keyFor(s.id,'check',ci))==='1') filled++; });
        (wb.scorecard || []).forEach((_, ri)=>{ total++; if(getValue(keyFor(s.id,'score',ri))) filled++; });
        total++; if(getValue(keyFor(s.id,'action')).trim()) filled++;
      });
      const pct = total ? Math.round(filled/total*100) : 0;
      $('#progressBar').style.width = pct + '%';
      $('#progressText').textContent = pct + '%';
    }

    function collectAnswersText(){
      const lines = [];
      lines.push('Conducting a DP Year — Participant Workbook Answers');
      lines.push('Generated from the interactive web version');
      lines.push('');
      slides.forEach(s => {
        lines.push(`SLIDE ${String(s.id).padStart(2,'0')} — ${s.title}`);
        const wb = s.workbook || {};
        (wb.questions || []).forEach((q, qi)=> lines.push(`${q}: ${getValue(keyFor(s.id,'q',qi)) || '—'}`));
        (wb.checklist || []).forEach((item, ci)=> lines.push(`[${getValue(keyFor(s.id,'check',ci))==='1'?'x':' '}] ${item}`));
        (wb.scorecard || []).forEach((item, ri)=> lines.push(`${item} readiness: ${getValue(keyFor(s.id,'score',ri)) || '—'}/10`));
        lines.push(`Action after this forum: ${getValue(keyFor(s.id,'action')) || '—'}`);
        lines.push('');
      });
      return lines.join('\n');
    }

    function exportAnswers(){
      const text = collectAnswersText();
      const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'DP_Year_Workbook_Answers.txt';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
    }

    function renderPrintArea(){
      $('#printArea').innerHTML = slides.map(s => {
        const wb = s.workbook || {};
        const q = (wb.questions || []).map((question, qi)=>`<p><b>${esc(question)}</b></p><div class="print-field">${esc(getValue(keyFor(s.id,'q',qi)) || '')}</div>`).join('');
        const checks = (wb.checklist || []).length ? `<p><b>Checklist</b></p>` + (wb.checklist || []).map((item, ci)=>`<p>${getValue(keyFor(s.id,'check',ci))==='1'?'☑':'☐'} ${esc(item)}</p>`).join('') : '';
        const scores = (wb.scorecard || []).length ? `<p><b>Readiness scorecard</b></p>` + (wb.scorecard || []).map((item, ri)=>`<p>${esc(item)}: ${esc(getValue(keyFor(s.id,'score',ri)) || '')} / 10</p>`).join('') : '';
        return `<section class="print-section"><h1>Slide ${String(s.id).padStart(2,'0')} | ${esc(s.title)}</h1><h2>${esc(s.subtitle || '')}</h2><p class="print-quote">${esc(s.quote || '')}</p>${q}${checks}${scores}<p><b>Action after this forum</b></p><div class="print-field">${esc(getValue(keyFor(s.id,'action')) || '')}</div></section>`;
      }).join('');
    }

    function showModal(title, body){ $('#modalTitle').textContent = title; $('#modalBody').textContent = body; $('#modal').classList.add('show'); }
    function closeModal(){ $('#modal').classList.remove('show'); }

    $('#prevBtn').addEventListener('click',()=>go(current-1));
    $('#nextBtn').addEventListener('click',()=>go(current+1));
    $('#exportBtn').addEventListener('click', exportAnswers);
    $('#printBtn').addEventListener('click',()=>{ renderPrintArea(); window.print(); });
    $('#notesBtn').addEventListener('click',()=>{ trainerNotesVisible = !trainerNotesVisible; $('#notesBtn').textContent = trainerNotesVisible ? 'Hide notes' : 'Trainer notes'; renderSlide(); });
    $('#audienceBtn').addEventListener('click',()=>{ document.body.classList.toggle('audience'); $('#audienceBtn').textContent = document.body.classList.contains('audience') ? 'Workbook view' : 'Audience view'; });
    $('#fullBtn').addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); });
    $('#closeModal').addEventListener('click', closeModal);
    $('#modal').addEventListener('click', e => { if(e.target.id === 'modal') closeModal(); });
    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowRight') go(current+1);
      if(e.key === 'ArrowLeft') go(current-1);
      if(e.key.toLowerCase() === 'f') $('#fullBtn').click();
      if(e.key.toLowerCase() === 'n') $('#notesBtn').click();
    });

    go(0);
  </script>
</body>
</html>
